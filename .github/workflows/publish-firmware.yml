name: Publish Firmware

on:
  workflow_run:
    workflows:
      - Create Release
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  get-release-info:
    name: Get Release Info
    runs-on: ubuntu-latest
    steps:
      - name: Get Latest Release
        id: get-latest-release
        uses: cardinalby/git-get-release-action@1.2.5
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          latest: true
          prerelease: false

    outputs:
      summary: ${{ steps.get-latest-release.outputs.body }}
      url: ${{ steps.get-latest-release.outputs.html_url }}
      version: ${{ steps.get-latest-release.outputs.tag_name }}

  build-firmware:
    name: Build Firmware
    uses: esphome/workflows/.github/workflows/build.yml@2025.10.0
    needs:
      - get-release-info
    with:
      files: |
        rgbww-led-controller-5a.factory.yaml
        rgbww-led-controller-10a.factory.yaml
      esphome-version: latest
      release-summary: ${{ needs.get-release-info.outputs.summary }}
      release-url: ${{ needs.get-release-info.outputs.url }}
      release-version: ${{ needs.get-release-info.outputs.version }}

  upload-firmware-to-release:
    name: Upload Firmware to Release
    uses: esphome/workflows/.github/workflows/upload-to-gh-release.yml@2025.10.0
    needs:
      - get-release-info
      - build-firmware
    with:
      version: ${{ needs.get-release-info.outputs.version }}
