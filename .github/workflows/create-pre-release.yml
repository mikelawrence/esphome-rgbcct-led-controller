name: Create Pre-Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  release:
    name: Create Pre-Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get Calendar Version
        id: calendar-version
        uses: harm-matthias-harms/calendar-version@v3.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Release Tag
        uses: thejeff77/action-push-tag@v1.0.0
        with:
          ref: main
          tag: ${{ steps.calendar-version.outputs.new-version }}
          message: ${{ steps.calendar-version.outputs.new-version }}

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          previous_tag: ${{ steps.calendar-version.outputs.old-version }}
          tag_name: ${{ steps.calendar-version.outputs.new-version }}
          generate_release_notes: true
          prerelease: true
