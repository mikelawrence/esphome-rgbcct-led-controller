substitutions:
  name: "rgbcct-led-controller-5a"
  friendly_name: "RGBCCT LED Controller 5A"

packages:
  # Include all of the core configuration
  core: !include rgbcct-led-controller-5a-esp32-c3.yaml

esphome:
  project:
    name: Mike Lawrence.${friendly_name}
    version: dev # This will be replaced by the github workflows with the `release` version

ota:
  - platform: http_request

update:
  - platform: http_request
    name: Firmware
    source: https://mikelawrence.github.io/esphome-rgbcct-led-controller/firmware/${name}.manifest.json

http_request:

dashboard_import:
  package_import_url: github://mikelawrence/esphome-rgbcct-led-controller/${name}-esp32-c3.yaml@main

wifi:

esp32_improv:
  authorizer: none

improv_serial:
