packages:
  # Include all of the core configuration
  core: !include rgbww-led-controller-5a.yaml

esphome:
  project:
    name: Mike Lawrence.RGBWW LED Controller 5 Amp
    # This will be replaced by the github workflows with the `release` version
    version: dev

ota:
  - platform: http_request

update:
  - platform: http_request
    name: Firmware
    source: https://mikelawrence.github.io/esphome-rgbcct-led-controller/firmware/rgbww-led-controller-5a.manifest.json

http_request:

dashboard_import:
  package_import_url: github://mikelawrence/esphome-rgbcct-led-controller/rgbww-led-controller-5a.yaml@main
  import_full_config: true

wifi:

esp32_improv:
  authorizer: none

improv_serial:
